services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp-backend
    restart: always
    volumes:
      # CHANGED: Now using a Named Volume instead of a local host folder
      - planner_db_data:/app/data

  frontend:
    build:
      context: ./pentest-frontend
      dockerfile: Dockerfile
    container_name: erp-frontend
    restart: always
    ports:
      - "80:8080"
    depends_on:
      - backend

# NEW: Declare the Named Volume so Docker knows to create it with the right permissions
volumes:
  planner_db_data: