version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp-backend
    restart: always
    volumes:
      - ./db_data:/app/data

  frontend:
    build:
      context: ./pentest-frontend
      dockerfile: Dockerfile
    container_name: erp-frontend
    restart: always
    ports:
      # Map the VM's standard HTTP port to the container's unprivileged port
      - "80:8080"
    depends_on:
      - backend