steps:
  # 1. Build the Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/gcp-repo/gcp-backend:$COMMIT_SHA'
      - '.'
  # 2. Push the Docker Image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/gcp-repo/gcp-backend:$COMMIT_SHA'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gcp-backend'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/gcp-repo/gcp-backend:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'gcp-backend-sa@gostcontrolpanel.iam.gserviceaccount.com'
      - '--network'
      - 'gcp-vpc'
      - '--subnet'
      - 'gcp-vpc-subnet'
      - '--vpc-egress'
      - 'private-ranges-only'
      - '--no-cpu-throttling'
      - '--min-instances'
      - '1'
      - '--set-env-vars'
      - 'GCP_PROJECT_ID=$PROJECT_ID,LOCATION=europe-west1,DB_INSTANCE_NAME=gost-db,DATASET_ID=gcp_audit_logs,TABLE_ID=security_events,SECRET_ID=system-config,POSTGRES_DB=gost-db,IAM_SA_EMAIL=gcp-backend-sa@gostcontrolpanel.iam,ALLOWED_ORIGINS=https://gcp.vitobonetti.nl,MASTER_ADMIN_EMAIL=vito.bonetti@randstadgroep.nl,GOOGLE_SHEET_ID=1MI_9uAIc5MZzum087g7oXQ65mwXP0-_6EqKwZTPNk4Y,GOOGLE_TAB_NAME=Applications,SHARED_DRIVE_ID=0AMbjgBIOgwqiUk9PVA,SOURCE_FOLDER_ID=1KNQLkxV9JYW2vk1PD8OYJ4aED7bcyaWK,ARCHIVE_FOLDER_ID=1ZRFPjd5URC7YLBPuVmaYkDNhhs7N5bq,COMMIT_SHA=$SHORT_SHA,BRANCH_NAME=$BRANCH_NAME,BUILD_ID=$BUILD_ID,REPO_NAME=$REPO_NAME,INTAKE_BUCKET_NAME=gcp-intake-artifacts,INTAKE_TOPIC_ID=gcp-trigger-ai-intake,SA_EMAIL=gcp-backend-sa@gostcontrolpanel.iam.gserviceaccount.com,IAP_AUDIENCE=/projects/449194831480/global/backendServices/3373396600165921115'

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/gcp-repo/gcp-backend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
